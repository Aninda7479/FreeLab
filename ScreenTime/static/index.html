<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Wellbeing</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <link rel="stylesheet" href="/static/css/dark_styles.css">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="user-profile">
                <div class="avatar blue">
                    <img src="https://api.dicebear.com/7.x/bottts/svg?seed=Windows" alt="Avatar">
                </div>
                <div class="user-info">
                    <h3>Windows PC</h3>
                    <span>This Device</span>
                </div>
            </div>
            
            <nav class="nav-menu">
                <a href="#" class="nav-item active">
                    <span class="icon">📊</span>
                    Summary
                </a>
                <a href="#" class="nav-item">
                    <span class="icon">📱</span>
                    Devices
                </a>
                <a href="#" class="nav-item">
                    <span class="icon">⚙️</span>
                    Settings
                </a>
            </nav>
            
            <div class="sync-status">
                <div class="status-indicator"></div>
                <span>mDNS Active - Waiting for Android</span>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header>
                <h2>Summary</h2>
            </header>

            <!-- Top Cards -->
            <div class="summary-cards">
                <div class="card time-card">
                    <div class="card-left">
                        <div class="ring-chart">
                            <span class="emoji">⏱️</span>
                        </div>
                    </div>
                    <div class="card-right">
                        <span class="label">Total tracked today</span>
                        <h3 id="total-time">0h 0m</h3>
                    </div>
                </div>
                
                <div class="card limit-card">
                    <div class="card-info">
                        <span class="label">Apps Used</span>
                        <h3 id="apps-count">0</h3>
                    </div>
                    <button class="btn-primary" onclick="syncData()">Sync Now</button>
                </div>
            </div>

            <!-- Main Chart Area -->
            <div class="chart-container">
                <canvas id="mainChart"></canvas>
            </div>

            <!-- Bottom Section -->
            <div class="bottom-grid">
                <!-- Top Activity -->
                <div class="top-activity">
                    <h3>Top Activity</h3>
                    <div class="activity-list" id="activity-list">
                        <!-- Populated by JS -->
                        <div class="activity-item loading">Loading data...</div>
                    </div>
                </div>

                <!-- Device Breakdown / Highlight -->
                <div class="device-summary">
                    <h3>Cross-Device Sync</h3>
                    <div class="device-card">
                        <div class="device-header">
                            <span class="platform-icon">🪟</span>
                            <span>Windows PC</span>
                            <span class="badge">Local</span>
                        </div>
                        <div class="device-stats" id="win-stats">Tracking...</div>
                    </div>
                    
                    <div class="device-card">
                        <div class="device-header">
                            <span class="platform-icon">🤖</span>
                            <span>Android Device</span>
                            <span class="badge offline" id="android-status">Offline</span>
                        </div>
                        <div class="device-stats">Waiting for mDNS sync on LAN.</div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="/static/js/dark_app.js"></script>
</body>
</html>
